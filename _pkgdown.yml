reference:
- title: Get information on neuron data items
  desc: >
    Use a neuron/line ID to get information about that neuron/line. For example,
    the MIP files available from NeuronBridge.
  contents:
  - '`neuronbridge_ids`'
  - '`neuronbridge_info`'
- title: Search for EM-LM hits
  desc: Take a connectome neuron/line and search for hits.
  contents:
  - '`neuronbridge_hits`'
  - '`neuronbridge_search`'
  - '`neuronbridge_avoid`'
- title: What's in a line?
  desc: >
    Estimated which connectome neurons are in a genetic driver line. Use this
    information to plan split combinations for sparser lines.
  contents:
  - '`neuronbridge_line_contents`'
  - '`neuronbridge_predict_split`'
- title: Plot MIP files
  desc: Retrieve and plot 2D colour maximal projection images (MIP) files
  contents:
  - '`neuronbridge_mip`'
  - '`plot_mip`'
  - '`scan_mip`'
  - '`neuronbridge_remove_mips`'
  - '`nrrd_to_mip`'
- title: FlyWire helpers
  desc: Utilities for converting FlyWire / Neuroglancer volumes to MIP images.
  contents:
  - '`ngl_scene_to_nrrd`'
  - '`root_id_to_nrrd`'
- title: Cross-reference lines against the KDRC KGutProject
  desc: >
    Helpers that drive a headless Chrome session (via the `chromote` package)
    to query the Korea Drosophila Resource Center KGutProject for expression
    of a given GAL4 line across ten regions of the adult gut.
  contents:
  - '`kdrc_lookup_lines`'
  - '`kdrc_search_line`'
  - '`kdrc_line_regions`'
  - '`kdrc_start_session`'
  - '`kdrc_close_session`'
- title: Resolve split-GAL4 lines to their hemidriver halves
  desc: >
    Look up the AD and DBD component enhancers of a published split-GAL4
    line (SS, IS, MB, ...) from FlyLight's S3 metadata.
  contents:
  - '`split_halves`'

